<!DOCTYPE html>
<html>
<head>
    <title>HR FAQ Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 20px;
        }

        .chat-container {
            max-width: 800px;
            margin: auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        #chatBox {
            height: 450px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            background: #fafafa;
            margin-bottom: 15px;
        }

        .user {
            color: #0a66c2;
            margin: 10px 0;
        }

        .bot {
            color: #1f7a1f;
            margin: 10px 0;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            background: #0a66c2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #084d96;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h1>HR FAQ Assistant</h1>
        <div id="chatBox"></div>

        <div class="input-area">
            <input
                type="text"
                id="userInput"
                placeholder="Ask your question..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            >
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>

        const API_URL = "https://bluecoast-sk-eqe8f4e7e8gyfyds.eastus2-01.azurewebsites.net/api/iGenticAutonomousAgent/Executor/1320093f-cad0-4346-bfed-eb859143c00c";

// Create one session ID per browser
let sessionId = localStorage.getItem("chatSessionId");
if (!sessionId) {
    sessionId = "session-" + Date.now() + "-" + Math.random().toString(36).substring(2, 9);
    localStorage.setItem("chatSessionId", sessionId);
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();

    if (!message) return;

    const chatBox = document.getElementById("chatBox");

    // Show user message
    chatBox.innerHTML += `<div class="user"><b>You:</b> ${message}</div>`;
    input.value = "";

    // Show typing message
    chatBox.innerHTML += `<div class="bot" id="typing"><b>Bot:</b> Typing...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userInput: message,
                sessionId: sessionId
            })
        });

        if (!response.ok) {
            throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        // Remove typing message
        const typing = document.getElementById("typing");
        if (typing) typing.remove();

        // Try different possible response fields
        let answer =
            data.response ||
            data.answer ||
            data.message ||
            data.output ||
            data.result ||
            "No response received.";

        // If the response itself is a string
        if (typeof data === "string") {
            answer = data;
        }

        // If nested response object exists
        if (data.response && typeof data.response === "object") {
            answer =
                data.response.message ||
                data.response.answer ||
                JSON.stringify(data.response);
        }

        chatBox.innerHTML += `<div class="bot"><b>Bot:</b> ${answer}</div>`;
    }
    catch (error) {
        const typing = document.getElementById("typing");
        if (typing) typing.remove();

        chatBox.innerHTML += `
            <div class="bot">
                <b>Bot:</b> Error connecting to the chatbot.<br>
                <small>${error.message}</small>
            </div>`;

        console.error("API Error:", error);
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}
      
    </script>
</body>
</html>
